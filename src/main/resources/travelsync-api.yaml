openapi: 3.0.3
info:
  title: TravelSync API
  version: 1.0.0
  description: |
    ## TravelSync API Documentation
    This API provides endpoints for managing travel itineraries, including creating, updating, and retrieving travel plans.
  contact:
    email: pniecke@gmail.com

servers:
  - url: http://localhost:8080/api
    description: Local development server

paths:
  /health:
    get:
      tags: [ Health ]
      operationId: getHealth
      summary: Health check for the TravelSync API
      responses:
        '200':
          description: Health check successful
          content:
            text/plain:
              schema:
                type: string
                example: "UP"

  /trips:
    post:
      tags: [ Trip ]
      operationId: createTrip
      summary: Create a new trip
      security:
        - OidcAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Trip'
      responses:
        '201':
          description: Trip created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
        '400':
          description: Bad Request - Invalid trip data
        '401':
          description: Unauthorized - Authentication required

  /trips/my-trips:
    get:
      tags: [ Trip ]
      operationId: getTripsByLoggedInUser
      summary: Get Trips for Logged-in User
      description: Retrieves a list of trips associated with the currently authenticated user.
      security:
        - OidcAuth: [ ]
      responses:
        '200':
          description: List of trips for the logged-in user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
        '401':
          description: Unauthorized - Authentication required

  /trips/{id}:
    put:
      tags: [ Trip ]
      operationId: updateTrip
      summary: Update an existing trip
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier of the trip to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
      responses:
        '200':
          description: Trip updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          description: Bad Request - Invalid trip data
        '401':
          description: Unauthorized - Authentication required

  /expenses:
    get:
      tags: [ Expense ]
      operationId: getExpenses
      summary: Get expenses with optional filtering
      description: Returns a list of expenses, optionally filtered by creator or payer
      security:
        - OidcAuth: [ ]
      parameters:
        - name: createdBy
          in: query
          description: When true, return only expenses created by the current user
          required: false
          schema:
            type: boolean
        - name: paidBy
          in: query
          description: When true, return only expenses paid by the current user
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
    post:
      tags: [ Expense ]
      operationId: createExpense
      summary: Create a new expense
      security:
        - OidcAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Expense'
      responses:
        '201':
          description: Expense created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '400':
          description: Bad Request - Invalid expense data
        '401':
          description: Unauthorized - Authentication required

  /user/me:
    get:
      tags: [ User ]
      operationId: getLoggedInUser
      summary: Get the currently logged-in user
      security:
        - OidcAuth: [ ]
      responses:
        '200':
          description: Successfully retrieved the logged-in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - Authentication required

  /users:
    get:
      tags: [ User ]
      operationId: getAllUsers
      summary: Get all users
      security:
        - OidcAuth: [ ]
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - Authentication required

components:
  securitySchemes:
    OidcAuth:
      type: openIdConnect
      openIdConnectUrl: https://accounts.google.com/.well-known/openid-configuration
      description: >
        OAuth 2.0 / OpenID Connect authentication via Google. 
        The ID Token (JWT) issued by Google should be sent as a Bearer token in the Authorization header of requests.

  schemas:
    Trip:
      type: object
      required:
        - destination
        - startTime
        - status
        - participants
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the trip
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Name of the trip
          example: "Summer Vacation 2025"
        participants:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/User'
        destination:
          type: string
          minLength: 1
          maxLength: 200
          description: Destination of the trip
          example: "Sardinia, Italy"
        startTime:
          type: string
          format: local-date-time
          description: Start time of the trip
          example: "2025-07-06T10:00:00"
        endTime:
          type: string
          format: local-date-time
          description: End time of the trip
          example: "2025-07-20T18:00:00"
        description:
          type: string
          maxLength: 2000
          description: Description of the trip
          example: "A relaxing summer vacation in Sardinia."
        status:
          $ref: '#/components/schemas/TripStatus'
        expenses:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Expense'

    User:
      type: object
      required:
        - username
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the user
          example: "123e4567-e89b-12d3-a456-426614174000"
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[A-Za-z0-9._-]+$'
          description: Username of the user
          example: "john_doe"
        firstName:
          type: string
          maxLength: 100
          description: First name of the user
          example: "John"
        lastName:
          type: string
          maxLength: 100
          description: Last name of the user
          example: "Doe"
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address of the user
          example: "john.doe@sample.ch"
        mobile:
          type: string
          maxLength: 32
          pattern: '^[+0-9 ()-]+$'
          description: Mobile phone number of the user
          example: "+41 79 123 45 67"
        locale:
          type: string
          maxLength: 16
          description: Locale of the user
          example: "en-US"
        roles:
          type: array
          maxItems: 16
          items:
            $ref: '#/components/schemas/UserRole'
        password:
          type: string
          minLength: 12
          maxLength: 72
          description: Password of the user (write-only)
          writeOnly: true
          example: "securepassword"

    Expense:
      type: object
      required:
        - amount
        - currency
        - tripId
        - createdBy
        - dateOfExpense
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the expense
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        description:
          type: string
          maxLength: 500
          description: Description of the expense
          example: "Hotel accommodation"
        amount:
          type: number
          format: double
          minimum: 0
          maximum: 1000000000
          description: Amount of the expense
          example: 150.75
        currency:
          $ref: '#/components/schemas/Currency'
        dateOfExpense:
          type: string
          format: local-date-time
          description: Date of the expense
          example: "2025-07-10T15:30:00"
        lastModified:
          type: string
          format: local-date-time
          description: Last modified date and time of the expense
          example: "2025-07-10T15:30:00"
        createdBy:
          $ref: '#/components/schemas/User'
        paidBy:
          $ref: '#/components/schemas/User'
        tripId:
          type: string
          format: uuid
          description: Unique identifier of the trip associated with the expense
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"

    Currency:
      type: string
      enum: [ CHF, EUR, USD, GBP ]
      description: Currency code for an expense
      example: "CHF"

    TripStatus:
      type: string
      enum: [ PLANNED, IN_PROGRESS, COMPLETED, CANCELLED ]
      description: Status of the trip
      example: "PLANNED"

    UserRole:
      type: string
      enum: [ USER, ADMIN ]
      description: Role of the user
      example: "USER"

    SignUpRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[A-Za-z0-9._-]+$'
          description: Username for the new account
          example: "new_user"
        password:
          type: string
          minLength: 12
          maxLength: 72
          description: Password for the new account
          example: "securepassword123"
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address for the new account
          example: "user@example.com"

    SignInRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          minLength: 3
          maxLength: 254
          description: Email address or username for authentication
          example: "existing@user.ch"
        password:
          type: string
          minLength: 1
          maxLength: 72
          description: Password for authentication
          example: "securepassword123"

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'