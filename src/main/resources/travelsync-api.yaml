openapi: 3.0.3
info:
  title: TravelSync API
  version: 1.0.0
  description: |
    ## TravelSync API Documentation
    This API provides endpoints for managing travel itineraries, including creating, updating, and retrieving travel plans.
  contact:
    email: pniecke@gmail.com

servers:
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: Health
  - name: Authentication
  - name: Trip
  - name: Expense
  - name: User

paths:
  # --- Health ----------------------------------------------------------------
  /health:
    get:
      tags: [ Health ]
      operationId: getHealth
      summary: Health check for the TravelSync API
      responses:
        '200':
          description: Health check successful
          content:
            text/plain:
              schema:
                type: string
                example: "UP"

  # --- Authentication --------------------------------------------------------
  /auth/signup:
    post:
      tags: [ Authentication ]
      operationId: signUp
      summary: Register a new local-database account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Bad Request - invalid signup data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict - username or email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Too Many Requests - signup rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
                format: int64
              description: Seconds until the next signup attempt is allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/signin:
    post:
      tags: [ Authentication ]
      operationId: signIn
      summary: Authenticate a local-database account and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated; session cookie issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized - bad credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Too Many Requests - account locked or IP throttled
          headers:
            Retry-After:
              schema:
                type: integer
                format: int64
              description: Seconds until the next sign-in attempt is allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/logout:
    post:
      tags: [ Authentication ]
      operationId: logout
      summary: End the current session
      description: Idempotent — succeeds whether or not a session exists.
      responses:
        '204':
          description: Session ended (or no session was active)

  /auth/change-password:
    post:
      tags: [ Authentication ]
      operationId: changePassword
      summary: Change the password of the currently logged-in user
      security:
        - OidcAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Bad Request - new password fails policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized - current password incorrect or no session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # --- Trip ------------------------------------------------------------------
  /trips:
    post:
      tags: [ Trip ]
      operationId: createTrip
      summary: Create a new trip
      security:
        - OidcAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Trip'
      responses:
        '201':
          description: Trip created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
        '400':
          description: Bad Request - Invalid trip data
        '401':
          description: Unauthorized - Authentication required

  /trips/my-trips:
    get:
      tags: [ Trip ]
      operationId: getTripsByLoggedInUser
      summary: Get Trips for Logged-in User
      description: Retrieves a list of trips associated with the currently authenticated user.
      security:
        - OidcAuth: [ ]
      responses:
        '200':
          description: List of trips for the logged-in user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
        '401':
          description: Unauthorized - Authentication required

  /trips/{id}:
    put:
      tags: [ Trip ]
      operationId: updateTrip
      summary: Update an existing trip
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier of the trip to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
      responses:
        '200':
          description: Trip updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          description: Bad Request - Invalid trip data
        '401':
          description: Unauthorized - Authentication required

  # --- Expense ---------------------------------------------------------------
  /expenses:
    get:
      tags: [ Expense ]
      operationId: getExpenses
      summary: Get expenses with optional filtering
      description: Returns a list of expenses, optionally filtered by creator, payer or trip
      security:
        - OidcAuth: [ ]
      parameters:
        - name: createdBy
          in: query
          description: When true, return only expenses created by the current user
          required: false
          schema:
            type: boolean
        - name: paidBy
          in: query
          description: When true, return only expenses paid by the current user
          required: false
          schema:
            type: boolean
        - name: tripId
          in: query
          description: Filter expenses to a single trip
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
    post:
      tags: [ Expense ]
      operationId: createExpense
      summary: Create a new expense
      security:
        - OidcAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Expense'
      responses:
        '201':
          description: Expense created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '400':
          description: Bad Request - Invalid expense data
        '401':
          description: Unauthorized - Authentication required

  /expenses/{id}:
    get:
      tags: [ Expense ]
      operationId: getExpense
      summary: Get a single expense by id
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The expense
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags: [ Expense ]
      operationId: deleteExpense
      summary: Delete an expense (cascades shares)
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Expense deleted
        '403':
          description: Forbidden
        '404':
          description: Expense not found

  /expenses/{id}/shares:
    get:
      tags: [ Expense ]
      operationId: getExpenseShares
      summary: List all shares for an expense
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shares for this expense
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseShare'
        '404':
          description: Expense not found
    put:
      tags: [ Expense ]
      operationId: updateExpenseShares
      summary: Replace all shares for an expense
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ExpenseShare'
      responses:
        '200':
          description: Updated shares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseShare'
        '400':
          description: Invalid shares (sum mismatch, non-participant, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
        '404':
          description: Expense not found

  /trips/{id}/balances:
    get:
      tags: [ Trip ]
      operationId: getTripBalances
      summary: Get net balances and suggested settlements for a trip
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Per-currency net balances and suggested settlements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripBalances'
        '403':
          description: Forbidden
        '404':
          description: Trip not found

  /trips/{id}/settlements:
    get:
      tags: [ Trip ]
      operationId: getTripSettlements
      summary: List all settlements for a trip
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Settlements for this trip
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Settlement'
    post:
      tags: [ Trip ]
      operationId: createSettlement
      summary: Record a settlement (cash payment between participants)
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSettlementRequest'
      responses:
        '201':
          description: Settlement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settlement'
        '400':
          description: Invalid settlement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden

  /trips/{id}/settlements/{settlementId}:
    delete:
      tags: [ Trip ]
      operationId: deleteSettlement
      summary: Delete a recorded settlement
      security:
        - OidcAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
        '404':
          description: Settlement not found

  # --- User ------------------------------------------------------------------
  /user/me:
    get:
      tags: [ User ]
      operationId: getLoggedInUser
      summary: Get the currently logged-in user
      security:
        - OidcAuth: [ ]
      responses:
        '200':
          description: Successfully retrieved the logged-in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - Authentication required

    patch:
      tags: [ User ]
      operationId: updateLoggedInUser
      summary: Update the currently logged-in user
      description: |
        Updates profile fields of the authenticated user. Only fields present in
        the request body are modified. The user is identified by the session — `id`,
        `roles`, and `password` cannot be set through this endpoint.
      security:
        - OidcAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Successfully updated the logged-in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request - Invalid user data
        '401':
          description: Unauthorized - Authentication required
        '409':
          description: Conflict - username or email already in use

  /users:
    get:
      tags: [ User ]
      operationId: getAllUsers
      summary: Get all users
      security:
        - OidcAuth: [ ]
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - Authentication required

components:
  securitySchemes:
    OidcAuth:
      type: openIdConnect
      openIdConnectUrl: https://accounts.google.com/.well-known/openid-configuration
      description: >
        OAuth 2.0 / OpenID Connect authentication via Google.
        The ID Token (JWT) issued by Google should be sent as a Bearer token in the Authorization header of requests.

  schemas:
    # --- Domain ------------------------------------------------------------
    Trip:
      type: object
      required:
        - destination
        - startTime
        - status
        - participants
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the trip
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Name of the trip
          example: "Summer Vacation 2025"
        participants:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/User'
        destination:
          type: string
          minLength: 1
          maxLength: 200
          description: Destination of the trip
          example: "Sardinia, Italy"
        startTime:
          type: string
          format: local-date-time
          description: Start time of the trip
          example: "2025-07-06T10:00:00"
        endTime:
          type: string
          format: local-date-time
          description: End time of the trip
          example: "2025-07-20T18:00:00"
        description:
          type: string
          maxLength: 2000
          description: Description of the trip
          example: "A relaxing summer vacation in Sardinia."
        status:
          $ref: '#/components/schemas/TripStatus'
        expenses:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Expense'

    Expense:
      type: object
      required:
        - amount
        - currency
        - tripId
        - createdBy
        - dateOfExpense
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the expense
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        description:
          type: string
          maxLength: 500
          description: Description of the expense
          example: "Hotel accommodation"
        amount:
          type: number
          format: double
          minimum: 0
          maximum: 1000000000
          description: Amount of the expense
          example: 150.75
        currency:
          $ref: '#/components/schemas/Currency'
        dateOfExpense:
          type: string
          format: local-date-time
          description: Date of the expense
          example: "2025-07-10T15:30:00"
        lastModified:
          type: string
          format: local-date-time
          description: Last modified date and time of the expense
          example: "2025-07-10T15:30:00"
        createdBy:
          $ref: '#/components/schemas/User'
        paidBy:
          $ref: '#/components/schemas/User'
        tripId:
          type: string
          format: uuid
          description: Unique identifier of the trip associated with the expense
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        shares:
          type: array
          maxItems: 100
          description: Per-participant breakdown of how this expense is split.
          items:
            $ref: '#/components/schemas/ExpenseShare'

    ExpenseShareType:
      type: string
      enum: [ EQUAL, EXACT, PERCENT ]
      description: How an expense is split among participants
      example: "EQUAL"

    ExpenseShare:
      type: object
      required:
        - user
        - amount
        - shareType
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the share
        user:
          $ref: '#/components/schemas/User'
        amount:
          type: number
          format: double
          minimum: 0
          maximum: 1000000000
          description: Absolute amount this user owes for the expense
          example: 50.00
        shareType:
          $ref: '#/components/schemas/ExpenseShareType'
        shareValue:
          type: number
          format: double
          minimum: 0
          description: |
            Percent value when shareType=PERCENT (0-100); null otherwise.
          example: 25.0

    Settlement:
      type: object
      required:
        - tripId
        - fromUser
        - toUser
        - amount
        - currency
        - settledAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the settlement
        tripId:
          type: string
          format: uuid
        fromUser:
          $ref: '#/components/schemas/User'
        toUser:
          $ref: '#/components/schemas/User'
        amount:
          type: number
          format: double
          minimum: 0
          maximum: 1000000000
        currency:
          $ref: '#/components/schemas/Currency'
        note:
          type: string
          maxLength: 500
        settledAt:
          type: string
          format: local-date-time
        createdAt:
          type: string
          format: local-date-time

    CreateSettlementRequest:
      type: object
      required:
        - fromUserId
        - toUserId
        - amount
        - currency
      properties:
        fromUserId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0
          maximum: 1000000000
        currency:
          $ref: '#/components/schemas/Currency'
        note:
          type: string
          maxLength: 500
        settledAt:
          type: string
          format: local-date-time

    UserBalance:
      type: object
      required:
        - user
        - currency
        - net
      properties:
        user:
          $ref: '#/components/schemas/User'
        currency:
          $ref: '#/components/schemas/Currency'
        net:
          type: number
          format: double
          description: |
            Net balance for this user in this currency: positive = is owed
            money; negative = owes money.

    SuggestedSettlement:
      type: object
      required:
        - fromUser
        - toUser
        - currency
        - amount
      properties:
        fromUser:
          $ref: '#/components/schemas/User'
        toUser:
          $ref: '#/components/schemas/User'
        currency:
          $ref: '#/components/schemas/Currency'
        amount:
          type: number
          format: double
          minimum: 0

    TripBalances:
      type: object
      required:
        - tripId
        - balances
        - suggestedSettlements
      properties:
        tripId:
          type: string
          format: uuid
        balances:
          type: array
          items:
            $ref: '#/components/schemas/UserBalance'
        suggestedSettlements:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedSettlement'

    User:
      type: object
      required:
        - username
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the user
          example: "123e4567-e89b-12d3-a456-426614174000"
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[A-Za-z0-9._-]+$'
          description: Username of the user
          example: "john_doe"
        firstName:
          type: string
          maxLength: 100
          description: First name of the user
          example: "John"
        lastName:
          type: string
          maxLength: 100
          description: Last name of the user
          example: "Doe"
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address of the user
          example: "john.doe@sample.ch"
        mobile:
          type: string
          maxLength: 32
          pattern: '^[+0-9 ()-]+$'
          description: Mobile phone number of the user
          example: "+41 79 123 45 67"
        locale:
          type: string
          maxLength: 16
          description: Locale of the user
          example: "en-US"
        roles:
          type: array
          maxItems: 16
          items:
            $ref: '#/components/schemas/UserRole'
        password:
          type: string
          minLength: 12
          maxLength: 72
          description: Password of the user (write-only)
          writeOnly: true
          example: "securepassword"
        authProvider:
          $ref: '#/components/schemas/AuthProvider'
          readOnly: true
          description: |
            Identifies the authentication backend the account uses. Read-only;
            assigned at signup or first OAuth login. Clients use this to hide
            password-management UI for accounts they can't actually manage
            (e.g., Google-only accounts).

    # --- Enums -------------------------------------------------------------
    Currency:
      type: string
      enum: [ CHF, EUR, USD, GBP ]
      description: Currency code for an expense
      example: "CHF"

    TripStatus:
      type: string
      enum: [ PLANNED, IN_PROGRESS, COMPLETED, CANCELLED ]
      description: Status of the trip
      example: "PLANNED"

    UserRole:
      type: string
      enum: [ USER, ADMIN ]
      description: Role of the user
      example: "USER"

    AuthProvider:
      type: string
      enum: [ DATABASE, GOOGLE, APPLE ]
      description: Authentication backend used by the account
      example: "DATABASE"

    # --- Auth requests / responses ----------------------------------------
    SignUpRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[A-Za-z0-9._-]+$'
          description: Username for the new account
          example: "new_user"
        password:
          type: string
          minLength: 12
          maxLength: 72
          description: Password for the new account
          example: "securepassword123"
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address for the new account
          example: "user@example.com"
        firstName:
          type: string
          maxLength: 100
          description: First name of the user
          example: "John"
        lastName:
          type: string
          maxLength: 100
          description: Last name of the user
          example: "Doe"

    SignInRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          minLength: 3
          maxLength: 254
          description: Email address or username for authentication
          example: "existing@user.ch"
        password:
          type: string
          minLength: 1
          maxLength: 72
          description: Password for authentication
          example: "securepassword123"

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 72
          description: The current password of the user
        newPassword:
          type: string
          minLength: 12
          maxLength: 72
          description: The new password for the user

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable status message
          example: "Account created successfully"

    ApiError:
      type: object
      description: Generic error envelope returned by failing endpoints.
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message safe to display to the user
          example: "An account with that email already exists. Please sign in instead."
        retryAfterSeconds:
          type: integer
          format: int64
          description: |
            For 429 responses: seconds the client should wait before retrying.
            Mirrors the value of the `Retry-After` header.
          example: 600

    # --- User update ------------------------------------------------------
    UpdateUserRequest:
      type: object
      description: |
        Partial profile update. All fields optional; only fields present in the
        request are applied. `id`, `roles`, and `password` are intentionally
        excluded — `id` is taken from the session, `roles` is admin-only, and
        password changes go through `/auth/change-password`.
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[A-Za-z0-9._-]+$'
          example: "john_doe"
        firstName:
          type: string
          maxLength: 100
          example: "John"
        lastName:
          type: string
          maxLength: 100
          example: "Doe"
        email:
          type: string
          format: email
          maxLength: 254
          example: "john.doe@sample.ch"
        mobile:
          type: string
          maxLength: 32
          pattern: '^[+0-9 ()-]+$'
          example: "+41 79 123 45 67"
        locale:
          type: string
          maxLength: 16
          example: "en-US"
