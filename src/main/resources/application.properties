spring.application.name=TravelSync
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:1ca39ef0-8458-48f9-9944-7ff0b73ba525
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

spring.jpa.hibernate.ddl-auto=update

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
server.port=8080

# openapi-generator 7.x kotlin-spring no longer emits a class-level
# @RequestMapping("${api.base-path:/api}") on generated APIs, so we add the
# /api prefix at the DispatcherServlet level. AuthController still uses
# ${api.base-path}/auth, so we blank that property to avoid a double prefix.
spring.mvc.servlet.path=/api
api.base-path=

# Session configuration
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m

# Application configuration
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

